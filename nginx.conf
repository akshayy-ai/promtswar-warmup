server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self';
       script-src  'self' https://www.gstatic.com https://www.googletagmanager.com https://apis.google.com;
       style-src   'self' https://fonts.googleapis.com;
       font-src    https://fonts.gstatic.com;
       img-src     'self' data: https://*.googleusercontent.com;
       frame-src   https://accounts.google.com https://promtswar-warmup-4e479.firebaseapp.com;
       connect-src https://generativelanguage.googleapis.com
                   https://firestore.googleapis.com
                   https://firebase.googleapis.com
                   https://www.gstatic.com
                   https://identitytoolkit.googleapis.com
                   https://securetoken.googleapis.com
                   https://www.google-analytics.com
                   https://analytics.google.com
                   https://www.youtube.com;
       frame-ancestors 'none';"
      always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — no add_header here so parent security headers are inherited
    location ~* \.(css|js)$ {
        expires 1h;
    }

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 256;
}
